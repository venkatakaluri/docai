<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Formatter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #f4f5f7;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px;
}
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,.10);
  padding: 32px 28px;
  max-width: 660px;
  width: 100%;
}
h1 { font-size: 20px; color: #111; margin-bottom: 5px; }
.sub { font-size: 13px; color: #777; margin-bottom: 24px; line-height: 1.6; }
label {
  display: block;
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: #555;
  margin-bottom: 6px;
}
textarea {
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 7px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: Arial, sans-serif;
  color: #111;
  outline: none;
  transition: border 0.15s;
  margin-bottom: 20px;
  min-height: 220px;
  resize: vertical;
  line-height: 1.7;
}
textarea:focus { border-color: #2563eb; }
button {
  width: 100%;
  padding: 13px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.15s;
  font-family: Arial, sans-serif;
}
button:hover { background: #1d4ed8; }
button:disabled { background: #93c5fd; cursor: not-allowed; }
.msg {
  margin-top: 14px;
  padding: 11px 14px;
  border-radius: 7px;
  font-size: 13px;
  line-height: 1.5;
  display: none;
}
.msg.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; display: block; }
.msg.ok   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
.msg.err  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>📄 Document Formatter</h1>
  <p class="sub">Paste any raw text — questions, notes, data, anything. AI formats it into a proper Word file and downloads it instantly.</p>

  <label>Paste your raw text</label>
  <textarea id="text" placeholder="Just paste anything here. Examples:

Class 7 Science Test Photosynthesis
Q1 what is photosynthesis 2 marks
Q2 name the organelle 1 mark
Q3 write the equation 2 marks
Q4 what are the raw materials 2 marks

OR notes:
French Revolution causes: financial crisis, food shortage, inequality
Key events: storming of bastille 1789, execution of king 1793
Key people: robespierre napoleon

OR a project report, resume details, meeting notes — ANYTHING."></textarea>

  <button id="btn" onclick="go()">Format &amp; Download Word File</button>
  <div class="msg" id="msg"></div>
</div>

<script>
function setMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function go() {
  const text = document.getElementById('text').value.trim();
  if (!text) { setMsg('Please paste some text first.', 'err'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Formatting… please wait';
  setMsg('AI is reading and formatting your document...', 'info');

  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({ error: 'Server error' }));
      throw new Error(e.error || 'Server error');
    }

    const blob  = await res.blob();
    const cd    = res.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="(.+?)"/);
    const fname = match ? match[1] : 'document.docx';

    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);

    setMsg('✅ Downloaded: ' + fname + ' — open in Word or Google Docs.', 'ok');
  } catch (e) {
    setMsg('Error: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Format & Download Word File';
  }
}
</script>
</body>
</html>
